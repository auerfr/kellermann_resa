<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kellermann — Espace Traiteur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0F2137; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
        .card-login { background:white; border-radius:20px; padding:2.5rem 2rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
        .symbol { font-size:48px; text-align:center; margin-bottom:0.75rem; }
        .titre { font-size:1.4rem; font-weight:700; color:#0F2137; text-align:center; margin-bottom:0.25rem; }
        .sous-titre { color:#C8A84B; font-size:0.9rem; text-align:center; margin-bottom:1.75rem; }
        .btn-connexion { background:#0F2137; color:white; border:none; border-radius:10px; padding:0.8rem; font-size:1rem; font-weight:600; width:100%; }
        .btn-connexion:hover { background:#1a3a5c; color:white; }
        .lien-retour { display:block; text-align:center; color:#94A3B8; font-size:0.82rem; margin-top:1.25rem; text-decoration:none; }
        .lien-retour:hover { color:#64748B; }
    </style>
</head>
<body>
    <div class="card-login">
        <div class="symbol">🍽</div>
        <div class="titre">Espace Traiteur</div>
        <div class="sous-titre">Kellermann Réservations</div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:0.85rem;">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold" style="color:#0F2137;">Identifiant</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" style="color:#0F2137;">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-connexion">Se connecter</button>
        </form>

        <a href="/" class="lien-retour">← Retour à l'accueil</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
