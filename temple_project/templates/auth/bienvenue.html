<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kellermann Réservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0F2137;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card-bienvenue {
            background: white;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .symbol { font-size: 56px; margin-bottom: 1rem; }
        .titre { font-size: 1.6rem; font-weight: 700; color: #0F2137; margin-bottom: 0.3rem; }
        .sous-titre { color: #C8A84B; font-size: 0.95rem; margin-bottom: 2rem; }
        .btn-acces {
            background: #0F2137; color: white; border: none; border-radius: 10px;
            padding: 0.9rem 1.5rem; font-size: 1rem; font-weight: 600;
            width: 100%; display: block; text-decoration: none; margin-bottom: 0.75rem;
            transition: background .2s;
        }
        .btn-acces:hover { background: #1a3a5c; color: white; }
        .btn-admin {
            background: transparent; color: #94A3B8; border: 1px solid #E2E8F0;
            border-radius: 10px; padding: 0.75rem 1.5rem; font-size: 0.9rem;
            width: 100%; display: block; text-decoration: none; transition: all .2s;
        }
        .btn-admin:hover { border-color: #94A3B8; color: #64748B; }
        .separator { border: none; border-top: 1px solid #F1F5F9; margin: 1.5rem 0; }
        .footer-text { color: #CBD5E1; font-size: 0.75rem; margin-top: 1.5rem; }
        @media (max-width: 480px) {
            .card-bienvenue { padding: 2rem 1.25rem; }
            .symbol { font-size: 44px; }
            .titre { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="card-bienvenue">
        <div class="symbol">⚒</div>
        <div class="titre">Kellermann Réservations</div>
        <div class="sous-titre">Gestion des temples et salles de réunion</div>
        {% if messages %}{% for message in messages %}
        <div class="alert alert-danger py-2 mb-3 text-start" style="font-size:0.85rem;">{{ message }}</div>
        {% endfor %}{% endif %}
        <a href="{% url 'acces:login_visiteur' %}" class="btn-acces">🔑 Accéder au calendrier</a>
        <hr class="separator">
        <a href="{% url 'acces:login_admin' %}" class="btn-admin">⚙️ Espace administrateur</a>
        <div class="footer-text">Accès réservé aux membres des loges affiliées</div>
        <div style="margin-top:1.5rem;">
            <a href="{% url 'acces:login_traiteur' %}"
               style="color:#CBD5E1;font-size:0.72rem;text-decoration:none;opacity:0.6;">
                Accès traiteur
            </a>
        </div>
    </div>
</body>
</html>
