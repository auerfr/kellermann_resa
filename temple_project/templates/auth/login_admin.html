<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Kellermann Réservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0F2137;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card-login {
            background: white;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .symbol { font-size: 44px; text-align: center; margin-bottom: 0.75rem; }
        .titre { font-size: 1.5rem; font-weight: 700; color: #0F2137; text-align: center; margin-bottom: 0.25rem; }
        .sous-titre { color: #94A3B8; font-size: 0.85rem; text-align: center; margin-bottom: 0.75rem; }
        .badge-admin {
            background: #FEF3C7; color: #92400E; border-radius: 6px;
            padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600;
            display: inline-block; margin-bottom: 1.25rem;
        }
        .form-label { font-weight: 600; color: #334155; font-size: 0.85rem; }
        .form-control {
            border: 1px solid #E2E8F0; border-radius: 10px;
            padding: 0.75rem 1rem; font-size: 0.95rem;
        }
        .form-control:focus { border-color: #0F2137; box-shadow: 0 0 0 3px rgba(15,33,55,.15); }
        .btn-connexion {
            background: #0F2137; color: white; border: none; border-radius: 10px;
            padding: 0.85rem; font-size: 0.95rem; font-weight: 600;
            width: 100%; margin-top: 0.5rem; transition: background .2s;
        }
        .btn-connexion:hover { background: #1a3a5c; color: white; }
        .retour { text-align: center; margin-top: 1.25rem; }
        .retour a { color: #94A3B8; font-size: 0.85rem; text-decoration: none; }
        .retour a:hover { color: #64748B; }
        @media (max-width: 480px) {
            .card-login { padding: 2rem 1.25rem; }
            .titre { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="card-login">
        <div class="symbol">⚙️</div>
        <div class="titre">Espace Administrateur</div>
        <div class="sous-titre">Accès réservé aux gestionnaires</div>
        <div class="text-center"><span class="badge-admin">⚠️ Accès restreint</span></div>
        {% if messages %}{% for message in messages %}
        <div class="alert alert-danger py-2 mb-3" style="font-size:0.85rem;">{{ message }}</div>
        {% endfor %}{% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Identifiant</label>
                <input type="text" name="username" class="form-control"
                    placeholder="Votre identifiant" autofocus autocomplete="username">
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control"
                    placeholder="••••••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-connexion">Se connecter →</button>
        </form>
        <div class="retour"><a href="{% url 'acces:bienvenue' %}">← Retour à l'accueil</a></div>
    </div>
</body>
</html>
