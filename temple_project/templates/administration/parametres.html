{% extends "base.html" %}
{% block title %}Paramètres{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="h3 mb-1" style="color:#0F2137;">⚙ Paramètres</h1>
    <p class="text-muted small mb-0">Configuration générale de l'application</p>
  </div>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Mot de passe annuel</label>
          <input type="text" name="mot_de_passe_annuel" value="{{ params.mot_de_passe_annuel }}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Email admin</label>
          <input type="email" name="email_admin" value="{{ params.email_admin }}" class="form-control" required>
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Email traiteur
            <span class="text-muted fw-normal small">(copie agapes/banquets)</span>
          </label>
          <input type="email" name="email_traiteur" value="{{ params.email_traiteur }}" class="form-control"
                 placeholder="Laisser vide si non utilisé">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Email expéditeur</label>
          <input type="email" name="email_from" value="{{ params.email_from }}" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">SMTP Host</label>
          <input type="text" name="smtp_host" value="{{ params.smtp_host }}" class="form-control">
        </div>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label fw-semibold">SMTP Port</label>
          <input type="number" name="smtp_port" value="{{ params.smtp_port }}" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">SMTP User</label>
          <input type="text" name="smtp_user" value="{{ params.smtp_user }}" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-semibold">SMTP Password</label>
          <input type="password" name="smtp_password" value="{{ params.smtp_password }}" class="form-control">
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <div class="form-check">
            <input type="checkbox" name="smtp_tls" {% if params.smtp_tls %}checked{% endif %} class="form-check-input">
            <label class="form-check-label fw-semibold">SMTP TLS</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn px-4" style="background:#0F2137;color:white;">Enregistrer</button>
        <a href="{% url 'administration:tableau_de_bord' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>

    <hr class="my-4">
    <div class="d-flex align-items-center gap-3">
      <form method="post" action="{% url 'administration:tester_smtp' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-primary btn-sm">
          ✉ Tester l'envoi SMTP
        </button>
      </form>
      <span class="text-muted small">Envoie un email de test à <strong>{{ params.email_admin }}</strong></span>
    </div>
  </div>
</div>

{% endblock %}
