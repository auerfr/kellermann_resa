{% extends "base.html" %}
{% block title %}Notification envoyée{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 text-center">
        <div class="card shadow-sm py-4 px-3 mt-4">
            <div style="font-size:3rem;">✅</div>
            <h2 class="h4 mt-3 mb-2" style="color:#0F2137;">Notification envoyée</h2>
            <p class="text-muted mb-4">
                Le traiteur a été informé. Un email de confirmation vous a été envoyé.
            </p>
            <div class="d-flex gap-2 justify-content-center flex-wrap">
                <a href="/calendrier/" class="btn btn-outline-secondary">📅 Retour au calendrier</a>
                <a href="{% url 'traiteur:notification' %}" class="btn btn-outline-warning">🔔 Nouvelle notification</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
